name: Build iOS IPA

# Full RoboVM AOT build of the iOS app on a macOS runner, producing an
# UNSIGNED forge-ios.ipa artifact. No certificates, provisioning profiles or
# jailbreak involved anywhere: users install the unsigned IPA with
# Sideloadly or AltStore, which re-sign it with their own (free) Apple ID.
#
# The AOT compile takes ~30-60 minutes on a hosted macOS runner, so this is
# manual-dispatch / release-time only — the cheap per-PR iOS check is the
# separate Linux "iOS compatibility gate" workflow.

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'Bundle identifier for the build'
        required: false
        default: 'forge.cardforge.ios'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 120
    name: RoboVM iOS build (unsigned IPA)
    env:
      APP_ID: ${{ github.event.inputs.bundle_id || 'forge.cardforge.ios' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache pipeline tool jars
        uses: actions/cache@v4
        with:
          path: tmp/jvmdg/tools
          key: jvmdg-tools-${{ hashFiles('forge-gui-ios/pipeline/ios-pipeline.sh') }}

      - name: Cache RoboVM SDK + AOT cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.robovm
          key: robovm-${{ runner.os }}-${{ hashFiles('forge-gui-ios/pom.xml') }}

      - name: Build unsigned IPA
        # SKIP_CACHE_CLEAR reuses the (content-hashed, safe) RoboVM AOT cache
        # restored above — cuts rebuild time dramatically on cache hits.
        run: SKIP_CACHE_CLEAR=1 bash forge-gui-ios/pipeline/ios-pipeline.sh ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-ios-unsigned-ipa
          path: |
            forge-gui-ios/target/robovm.tmp/*.ipa
            forge-gui-ios/target/*.ipa
          if-no-files-found: error

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-reports
          path: |
            tmp/jvmdg/work/bridge-report.txt
            tmp/jvmdg/work/gui-ios-bridge-report.txt
            tmp/jvmdg/work/audit-report.txt
          if-no-files-found: ignore
