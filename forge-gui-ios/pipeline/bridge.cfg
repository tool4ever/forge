# ---------- jvmdg j16 Stream stubs (Stream.toList) ----------
# jvmdg rewrites Stream.toList() to J_U_S_Stream.toList(); that stub's static
# initializer reflectively loads java.util.stream.ReferencePipeline (absent on
# MobiVM) and rethrows, crashing the first toList() executed on device. Redirect
# it to a self-implemented drain (forge.compat.JStream8) instead of the stub.
member xyz/wagyourtail/jvmdg/j16/stub/java_base/J_U_S_Stream toList forge/compat/JStream8

